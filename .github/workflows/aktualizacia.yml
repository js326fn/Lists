name: Hodinova Aktualizacia Maltrail Zoznamu

on:
  schedule:
    - cron: '42 * * * *'
  workflow_dispatch:

jobs:
  run-parser:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repozitara
      uses: actions/checkout@v5

    - name: Nastavenie Pythonu
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Instalacia requests
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Spustenie parser.py
      run: python parser.py

    - name: Ulozenie zmien do repozitara
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Pridáme výsledný súbor do Gitu
        git add maltrail.txt
        
        # Ak skript našiel nové dáta, urobí sa commit a push. Ak sa nič nezmenilo, neurobí nič.
        git diff-index --quiet HEAD || (git commit -m "Automatická aktualizácia zoznamu" && git push)
